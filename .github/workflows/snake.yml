name: generate snake
on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#39FF88&color_dots=#0d1a12,#0f3d24,#1a7a45,#2ac96a,#39FF88
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#39FF88&color_dots=#0d1a12,#0f3d24,#1a7a45,#2ac96a,#39FF88
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
